<div id="view-predict" class="view view-2col active">

<!-- ═══════════════════════  PANEL CÁMARA  ══════════════════════════════════ -->
<div class="panel" id="panel-camera">
  <div class="panel-hdr">
    <h2>📷 Cámara Web</h2>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-secondary btn-sm" onclick="startAutoPredict()" id="btn-auto">🔄 Auto</button>
    </div>
  </div>
  <div class="panel-body">

    <div class="video-wrap">
      <video id="video" autoplay muted playsinline></video>
      <div class="video-placeholder" id="vid-placeholder">
        <span class="cam-icon">📷</span>
        <span>Activa la cámara para comenzar</span>
      </div>
    </div>

    <div class="btn-row" style="margin-bottom:0;">
      <button class="btn btn-secondary" onclick="startCamera()">Activar Cámara</button>
      <button class="btn btn-primary" id="btn-cap" onclick="captureAndPredict()" disabled>🔍 Predecir</button>
    </div>

  </div>
</div>

<!-- ═══════════════════════  PANEL PREDICCIÓN  ══════════════════════════════ -->
<div class="panel" id="panel-pred">
  <div class="panel-hdr">
    <h2>🎯 Resultado</h2>
  </div>
  <div class="panel-body">

    <div id="pred-placeholder" style="text-align:center;color:var(--muted);padding:40px 8px;font-size:.85rem;">
      <div style="font-size:2.5rem;margin-bottom:8px;">🔢</div>
      Captura una imagen para ver el resultado
    </div>

    <div class="pred-wrap" id="pred-wrap">
      <div class="preview-row">
        <img id="preview-img" alt="28×28">
        <div>
          <div class="digit-big" id="digit-big">?</div>
          <div class="digit-label">Dígito predicho</div>
        </div>
      </div>
      <div class="conf-bars" id="conf-bars"></div>
    </div>

  </div>
</div>

</div><!-- /#view-predict -->
